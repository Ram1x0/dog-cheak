<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペット好物チェック</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
  font-size: 18px;
}

.topbar {
  position: sticky;
  top: 0;
  background: #f5f5f5;
  z-index: 10;
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

input[type="text"] {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 6px;
  border: none;
  border-radius: 8px;
}

#filterBtn.active {
  background: #4CAF50;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.item {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.15s;
}

.item.checked {
  filter: grayscale(100%);
  opacity: 0.4;
}

.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 4px;
  font-size: 11px;
  color: white;
  background: rgba(0,0,0,0.6);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tap-area {
  display: block;
  cursor: pointer;
}

.tap-area input {
  display: none;
}

.tap-area::after {
  content: "✔";
  position: absolute;
  top: 5px;
  right: 5px;
  background: white;
  border-radius: 50%;
  padding: 3px;
  font-size: 10px;
  opacity: 0;
}

.item.checked .tap-area::after {
  opacity: 1;
}

.hidden {
  display: none;
}

#progress {
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🐶 ペット好物チェック</h1>

<div class="topbar">
  <input type="text" id="search" placeholder="検索">
  <button onclick="toggleFilter()" id="filterBtn">未チェック</button>
  <button onclick="resetData()">リセット</button>
</div>

<div id="progress">0 / 0</div>
<br>

<div id="list" class="grid"></div>

<script>

/* =========================
   データ
========================= */
const foods = [
{ name: "動物汎用エサ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/001.PNG" },
{ name: "ドッグフード", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/002.PNG" },
{ name: "ヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/003.PNG" },
{ name: "シイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/004.PNG" },
{ name: "マッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/005.PNG" },
{ name: "リンゴ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/006.PNG" },
{ name: "田園サラダ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/007.PNG" },
{ name: "ミックスジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/008.PNG" },
{ name: "ラズベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/009.PNG" },
{ name: "トマトソース", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/010.PNG" },
{ name: "ブルーベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/011.PNG" },
{ name:"リンゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/012.PNG" },
{ name:"イチゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/013.PNG" },
{ name: "キノコパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/014.PNG" },
{ name: "ヒラタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/015.PNG" },
{ name: "シイタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/016.PNG" },
{ name: "マッシュルームパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/017.PNG" },
{ name: "焼きキノコ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/018.PNG" },
{ name: "焼きヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/019.PNG" },
{ name: "焼きシイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/020.PNG" },
{ name: "焼きマッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/021.PNG" },
{ name: "シーフードリゾート", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/022.PNG" },
{ name: "カントリー風煮込み", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/023.PNG" },
{ name: "ミートソースパスタ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/024.PNG" },
{ name: "コーンポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/025.PNG" },
{ name: "豪華海鮮盛り合わせ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/026.PNG" },
{ name: "ミートバーガー", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/027.PNG" },
{ name: "ナスとひき肉の炒め物", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/028.PNG" },
{ name: "蒸しタラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/029.PNG" },
{ name: "蒸し黄金タラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/030.PNG" },
{ name: "大根おろし肉", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/031.PNG" },
{ name: "大根クリームポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/032.PNG" }
];

/* =========================
   状態管理
========================= */
const list = document.getElementById("list");
const progress = document.getElementById("progress");
const search = document.getElementById("search");
const filterBtn = document.getElementById("filterBtn");

let showUncheckedOnly = false;
const state = Array(foods.length).fill(false);

/* =========================
   ロード
========================= */
function loadState() {
  for (let i = 0; i < foods.length; i++) {
    state[i] = localStorage.getItem("dog_" + i) === "true";
  }
}

/* =========================
   描画
========================= */
function render() {
  list.innerHTML = "";

  const keyword = search.value.toLowerCase();

  foods.forEach((food, i) => {
    const checked = state[i];

    if (showUncheckedOnly && checked) return;
    if (!food.name.toLowerCase().includes(keyword)) return;

    const div = document.createElement("div");
    div.className = "item" + (checked ? " checked" : "");

    const imgUrl = food.img;

    div.innerHTML = `
      <label class="tap-area">
        <div class="img-box">
          <img src="${imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/300'">
          <div class="label">${food.name}</div>
        </div>
        <input type="checkbox" ${checked ? "checked" : ""}>
      </label>
    `;

    const cb = div.querySelector("input");

    cb.addEventListener("change", () => {
      state[i] = cb.checked;
      localStorage.setItem("dog_" + i, cb.checked);
      div.classList.toggle("checked", cb.checked);
      updateProgress();
    });

    list.appendChild(div);
  });

  updateProgress();
}

/* =========================
   進捗
========================= */
function updateProgress() {
  let checked = 0;
  for (let i = 0; i < state.length; i++) {
    if (state[i]) checked++;
  }
  progress.textContent = `チェック済 ${checked} / ${state.length}`;
}

/* =========================
   フィルター
========================= */
function toggleFilter() {
  showUncheckedOnly = !showUncheckedOnly;
  filterBtn.classList.toggle("active", showUncheckedOnly);
  render();
}

/* =========================
   検索
========================= */
search.addEventListener("input", render);

/* =========================
   リセット
========================= */
function resetData() {
  if (!confirm("全部リセットしますか？")) return;

  for (let i = 0; i < state.length; i++) {
    localStorage.removeItem("dog_" + i);
  }

  state.fill(false);
  render();
}

/* =========================
   PWA（オフライン対応）
========================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* 起動 */
loadState();
render();

</script>

</body>
</html>
