<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ペット好物チェック</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.topbar {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

input[type="text"] {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
}

#filterBtn.active {
  background: #4CAF50;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.item {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.2s ease;
}

.item.checked {
  filter: grayscale(100%);
  opacity: 0.5;
}

.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 6px;
  font-size: 13px;
  color: white;
  background: rgba(0,0,0,0.6);
  text-align: center;
}

input[type="checkbox"] {
  position: absolute;
  top: 8px;
  right: 8px;
  transform: scale(1.3);
  accent-color: #4CAF50;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🐶 ペット好物チェック</h1>

<div class="topbar">
  <input type="text" id="search" placeholder="検索...">
  <button onclick="toggleFilter()" id="filterBtn">未チェックのみ</button>
  <button onclick="resetData()">リセット</button>
</div>

<div id="progress">0 / 0</div>
<br>

<div id="list" class="grid"></div>

<script>
const foods = [
"動物共通の餌","ドッグフード","ヒラタケ"
];

const images = [
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg",
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg",
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg"
];

const list = document.getElementById("list");

foods.forEach((name, i) => {
  const id = "dog_" + i;

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <div class="img-box">
      <img src="${images[i]}">
      <div class="label">${name}</div>
    </div>
    <input type="checkbox" id="${id}">
  `;

  list.appendChild(div);

  const cb = div.querySelector("input");

  cb.checked = localStorage.getItem(id) === "true";

  if (cb.checked) div.classList.add("checked");

  cb.addEventListener("change", () => {
    localStorage.setItem(id, cb.checked);

    div.classList.toggle("checked", cb.checked);

    updateProgress();
    applyFilter();
    sortItems();
  });
});

let showUncheckedOnly = false;

function toggleFilter() {
  showUncheckedOnly = !showUncheckedOnly;

  const btn = document.getElementById("filterBtn");

  btn.innerText = showUncheckedOnly ? "すべて表示" : "未チェックのみ";
  btn.classList.toggle("active", showUncheckedOnly);

  applyFilter();
}

function applyFilter() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach((div, i) => {
    const checked = localStorage.getItem("dog_" + i) === "true";
    const text = foods[i].toLowerCase();

    let visible = true;

    if (showUncheckedOnly && checked) visible = false;
    if (!text.includes(keyword)) visible = false;

    div.classList.toggle("hidden", !visible);
  });
}

function sortItems() {
  const items = Array.from(list.children);

  items.sort((a, b) => {
    const aChecked = a.querySelector("input").checked;
    const bChecked = b.querySelector("input").checked;
    return aChecked - bChecked;
  });

  items.forEach(item => list.appendChild(item));
}

function updateProgress() {
  const total = foods.length;
  let checked = 0;

  foods.forEach((_, i) => {
    if (localStorage.getItem("dog_" + i) === "true") checked++;
  });

  document.getElementById("progress").innerText = checked + " / " + total;
}

function resetData() {
  if (confirm("全部リセットしますか？")) {
    foods.forEach((_, i) => {
      localStorage.removeItem("dog_" + i);
    });
    location.reload();
  }
}

// 検索イベント
document.getElementById("search").addEventListener("input", () => {
  applyFilter();
});

updateProgress();
applyFilter();
sortItems();
</script>

</body>
</html>
