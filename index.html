/* 背景の上に薄いフィルター */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  z-index: -1;
}

h1 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 10px;
}

.topbar {
  display: flex;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 999; /* ←これ追加（超重要） */
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

input {
  flex: 1;
  padding: 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border-radius: 14px;

  background: linear-gradient(145deg, #ffffff, #e6e6e6);

  box-shadow:
    0 4px 0 #cfcfcf,
    0 6px 10px rgba(0,0,0,0.1);

  transition: all 0.08s ease;
}

button:active {
  transform: translateY(4px) scale(0.95);

  box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.2);
}  
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

/* iPhone対策 */
.item {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.item.pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* 画像はタップ領域 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.img-box:active {
  transform: scale(0.97);
  transition: 0.1s;
}

/* ボタン領域 */
.btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.btns button {
  font-size: 12px;
  padding: 10px 0;
  border-radius: 10px;
  min-height: 42px;
  font-family: inherit;
  touch-action: manipulation;
}

.closeBtn {
  pointer-events: auto;
  z-index: 10000;
  touch-action: manipulation;
}
  
/* 2ボタン専用に3つ目は非表示 */
.givenBtn {
  display: none;
}

/* ボタン説明 */
.hint {
  font-size: 9px;
  text-align: center;
  opacity: 0.7;
  padding: 4px 0 8px;
}

.modal {
  pointer-events: auto;
}

.modalContent {
  pointer-events: auto;
}

/* 状態 */
.item.like { border: 3px solid #7bd88f; }
.item.dislike { border: 3px solid #ff6b6b; }
.item.given { border: 3px solid #6bb6ff; }
.item.given {
  opacity: 0.45;
  filter: grayscale(60%);
}

/* 念のため強制で明るさ維持 */
.item.like,
.item.dislike {
  opacity: 1;
  filter: none;
}

/* 画像 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.img-box:active {
  transform: scale(0.95);
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 5px;
  font-size: 10px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  text-align: center;
  left: 0;
  white-space: normal;       /* 改行OK */
  word-break: break-word;    /* 長い単語も折る */
  line-height: 1.2;
}

  /* 背景ぼかし */
.modal {
  pointer-events: auto; /* ←これに変更 */
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* ぷるぷるカード */
.modalContent {
  pointer-events: auto;
  position: relative;
  width: 85%;
  max-width: 320px;
  padding: 20px 16px 30px;
  
  border-radius: 20px;

  /* クリアパステル */
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.8),
    rgba(255,220,240,0.6),
    rgba(220,240,255,0.6)

  /* つや感 */
  box-shadow:
    0 8px 25px rgba(0,0,0,0.15),
    inset 0 0 15px rgba(255,255,255,0.7);

  backdrop-filter: blur(12px);

  text-align: center;

  animation: popIn 0.4s ease;
}

/* ぷるっと出現 */
@keyframes popIn {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  60% {
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.modalContent::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.6),
    transparent

  pointer-events: none;
}

.modalContent h2 {
  margin-bottom: 10px;
  font-size: 16px;

/* テキスト */
.modalContent p {
  font-size: 13px;
  margin: 6px 0;
}

/* ×ボタン（右上） */
.closeBtn {
  position: absolute;
  top: 8px;
  right: 10px;

  background: rgba(255,255,255,0.7);

  width: 26px;
  height: 26px;

  cursor: pointer;

.closeBtn:active {
  transform: scale(0.9);

.hideCheck {
  display: block;
  margin-top: 14px;
  font-size: 11px;
  opacity: 0.8;

/* ボタン */
.btns {
  display: flex;
  gap: 4px;
  padding: 5px;
}

.btns button {
  flex: 1;
  font-size: 10px;

.likeBtn { background: #d9f8e3; }

.givenBtn { background: #d6e9ff; }

#progress {
  text-align: center;
  margin-top: 10px;

}

  .img-box {
  cursor: pointer;
  touch-action: manipulation;
}

.btns button {
  min-height: 36px;
}

.petBtn.active {
  background: #ffe082;
}
  
</style>

let pets = JSON.parse(localStorage.getItem("pets")) || [
  { id: Date.now(), name: getDefaultPetName(), type: "dog" }
];

let currentPet = pets[0].id;
  
function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  closeLang();
  
  renderPets();
  loadPetState();
  render();
  updateStaticUI(); // ←これだけで全部変わる

}

function addPet() {
  if (pets.length >= 13) {
    alert(text[lang].maxPet);
    return;
  }

  const type = document.getElementById("petType").value;

  pets.push({
    id: Date.now(),
    name: text[lang].newPet,
    type: type
  });

  savePets();
  renderPets();
}

function deletePet(id) {

  if (!confirm(text[lang].deleteConfirm)) return;

  // 👇削除前に取得（←これが超重要）
  const pet = pets.find(p => p.id === id);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  // データ削除
  for (let i = 0; i < currentFoods.length; i++) {
    localStorage.removeItem(`pet_${id}_${pet.type}_${i}`);
  }

  // ペット削除
  pets = pets.filter(p => p.id !== id);

  // 0匹対策
  if (pets.length === 0) {
    pets.push({
      id: Date.now(),
      name: "ペット1",
      type: "dog"
    });
  }

  // currentPet調整
  if (currentPet === id) {
    currentPet = pets[0].id;
  }

  savePets();

  // 👇これを必ず最後に
  loadPetState();
  renderPets();
  render();
}

function renderPets() {
  const area = document.getElementById("petList");
  area.innerHTML = "";

  pets.forEach((p, i) => {
    const btn = document.createElement("button");

    btn.className = "petBtn";
    if (p.id === currentPet) {
      btn.classList.add("active");
    }

    btn.textContent = `${p.type === "dog" ? "🐶" : "🐱"} ${
     p.name === "ペット1" || p.name === "Pet 1"
    ? text[lang].petDefaultName
    : p.name
}`;

    // 長押し削除
    let pressTimer;

    btn.onmousedown = () => {
    pressTimer = setTimeout(() => {
    deletePet(p.id);
  }, 600);
};

    btn.onmouseup = () => clearTimeout(pressTimer);
    btn.onmouseleave = () => clearTimeout(pressTimer);

    btn.ontouchstart = () => {
    pressTimer = setTimeout(() => {
    deletePet(p.id);
  }, 600);
};

    btn.ontouchend = () => clearTimeout(pressTimer);

let tapTimer = null;

btn.onclick = () => {
  if (tapTimer) {
    clearTimeout(tapTimer);
    tapTimer = null;

    // 👇名前変更
    const newName = prompt(text[lang].renamePrompt, p.name);
    if (newName && newName.trim() !== "") {
      pets[i].name = newName;
      savePets();
      renderPets();
    }

  } else {
    tapTimer = setTimeout(() => {
      currentPet = p.id;
      loadPetState();
      renderPets();
      render();
      tapTimer = null;
    }, 250);
  }
};

    area.appendChild(btn);
  });
}

function savePets() {
  localStorage.setItem("pets", JSON.stringify(pets));
}

/* =====================
   状態
===================== */
let state = [];

function loadPetState() {

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  state = [];

  for (let i = 0; i < currentFoods.length; i++) {

    const saved = localStorage.getItem(`pet_${currentPet}_${pet.type}_${i}`);

    if (saved) {
      state[i] = JSON.parse(saved);
    } else {
      state[i] = { like: false, dislike: false, given: false };
    }
  }
}

const list = document.getElementById("list");
const search = document.getElementById("search");
const progress = document.getElementById("progress");

/* =====================
   優先度
===================== */
function getPriority(s) {
  if (s.like) return 1;
  if (s.dislike) return 2;
  if (!s.given && !s.like && !s.dislike) return 3;
  return 4;
}

/* =====================
   ソート
===================== */
function sortIndex(a, b) {
  return getPriority(state[a]) - getPriority(state[b]);
}

/* =====================
   サウンド
===================== */
function playSound(type) {
  if (!soundOn) return;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  // ぷち音（短くて軽い）
  osc.type = "sine";

  const base =
    type === "like" ? 800 :
    type === "dislike" ? 300 : 500;

  osc.frequency.setValueAtTime(base, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(base / 2, ctx.currentTime + 0.08);

  gain.gain.setValueAtTime(0.25, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);

  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

function toggleSound() {
  soundOn = !soundOn;
  localStorage.setItem("soundOn", soundOn);

  const btn = document.getElementById("soundBtn");
  if (btn) {
    btn.textContent = soundOn ? "🔊 ON" : "🔇 OFF";
  }
}
  
/* =====================
   状態変更
===================== */
function setState(i, type, div) {

  state[i][type] = !state[i][type];

  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));

  if (type === "like") state[i].dislike = false;
  if (type === "dislike") state[i].like = false;

  div.classList.add("pop");
  setTimeout(() => div.classList.remove("pop"), 200);

  playSound(type);
  render();
}

let profileVisible = false;

function toggleProfile() {

  const img = document.getElementById("profileImg");

  if (profileVisible) {
    img.style.display = "none";
    profileVisible = false;
    return;
  }

  generateProfile();
  img.style.display = "block";
  profileVisible = true;
}
  
function toggleGiven(i) {
  state[i].given = !state[i].given;
  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));
  playSound("given"); // ←これ入れるとゲーム感UP
  render();
}

/* 👇ここに新関数を入れる */
function tapFood(i) {
  state[i].given = !state[i].given;

  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));

  playSound("given");

  render();
}

/* =====================
   描画
===================== */
function render() {

  document.querySelector("h1").textContent = text[lang].title;
  search.placeholder = text[lang].search;

  list.innerHTML = "";

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  const keyword = search.value.toLowerCase();

  const order = [...currentFoods.keys()].sort(sortIndex);

  order.forEach(i => {

    const food = currentFoods[i];
    const s = state[i];

    const displayName = food.name[lang] || food.name.jp;
    
    if (!displayName.toLowerCase().includes(keyword)) return;

    const div = document.createElement("div");
    div.className = "item";

    if (s.like) div.classList.add("like");
    else if (s.dislike) div.classList.add("dislike");
    else if (s.given) div.classList.add("given");

    div.innerHTML = `
      <div class="img-box">
        <img src="${food.img}" loading="lazy">
        <div class="label">${displayName}</div>
      </div>

      <div class="btns">
        <button class="likeBtn">${text[lang].like}</button>
        <button class="dislikeBtn">${text[lang].dislike}</button>
      </div>

    `;

    div.querySelector(".likeBtn").onclick =
      () => setState(i, "like", div);

    div.querySelector(".dislikeBtn").onclick =
      () => setState(i, "dislike", div);

    div.querySelector(".img-box").onclick = 
      () => tapFood(i);

    list.appendChild(div);
  });

  updateProgress();

}

/* =====================
   進捗
===================== */
function updateProgress() {

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  let done = state.filter(s => s.like || s.dislike || s.given).length;

  progress.textContent = `エサリスト ${done} / ${currentFoods.length}`;
}

/* =====================
   リセット
===================== */
function resetData() {
  if (!confirm(text[lang].resetConfirm)) return;

  for (let i = 0; i < currentFoods.length; i++) {
  localStorage.removeItem(`pet_${currentPet}_${pet.type}_${i}`);

/* =====================
   プロフィール生成
===================== */
function generateProfile() {

  if (generating) return;
  generating = true;

  setTimeout(() => generating = false, 300);

  const canvas = document.getElementById("profileCanvas");
  const ctx = canvas.getContext("2d");

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

   ctx.clearRect(0, 0, 400, 200);

/* 背景カード */
ctx.fillStyle = "#fff";
ctx.fillRect(0, 0, 400, 200);

/* 枠 */
ctx.strokeStyle = "#ffb6c1";
ctx.lineWidth = 4;
ctx.strokeRect(0, 0, 400, 200);

if (!uploadedImage) {
  ctx.fillStyle = "#aaa";
  ctx.font = "12px Mochiy Pop One";
  ctx.fillText("タップで写真追加", 15, 160);
}
  
/* 画像エリア（左） */
if (uploadedImage) {
  ctx.drawImage(uploadedImage, 10, 25, 120, 120);
}

/* 名前（右側） */
ctx.font = "bold 18px Mochiy Pop One";
ctx.fillStyle = "#333";
ctx.fillText(pet.name, 150, 40);

/* 好き嫌い（右側リスト） */
let y = 70;

for (let i = 0; i < currentFoods.length; i++) {
  const s = state[i];
  if (!s) continue;

  const foodName = currentFoods[i].name[lang] || currentFoods[i].name.jp;

  if (s.like) {
    ctx.fillText("好き: " + foodName, 150, y);
    y += 18;
  }

  if (s.dislike) {
    ctx.fillText("嫌い: " + foodName, 150, y);
    y += 18;
  }

  if (y > 180) break;
}

  const img = document.getElementById("profileImg");
  img.src = canvas.toDataURL("image/png");
  img.style.display = "block";
}

function selectProfileImage() {
  document.getElementById("hiddenUpload").click();
}

let uploadedImage = null;

document.getElementById("hiddenUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    uploadedImage = new Image();
    uploadedImage.src = event.target.result;

    // 画像更新後に再生成
    generateProfile();
  };

  reader.readAsDataURL(file);
});

function openHelp() {
  const modal = document.getElementById("helpModal").style.display = "flex";
}

function closeHelp() {
  const modal = document.getElementById("helpModal");
  const hide = document.getElementById("hideHelp").checked;

  if (hide) {
    localStorage.setItem("hideHelp", "true");
  }

  modal.style.display = "none";
}

function openLang() {
  document.getElementById("langModal").style.display = "flex";
}

function closeLang() {
  document.getElementById("langModal").style.display = "none";
}
  
window.addEventListener("DOMContentLoaded", () => {

  // 🌐 言語判定
const savedLang = localStorage.getItem("lang");

if (savedLang) {
  lang = savedLang;
} else {
  const browserLang = navigator.language.toLowerCase();

  if (browserLang.includes("ja")) {
    lang = "jp";
  } else {
    lang = "en"; // 外国ユーザーは英語
  }
}

  // 🐶初期描画
  updateStaticUI();
  renderPets();
  loadPetState();
  render();

  // 🔍検索イベント（←ここに移動！）
  const search = document.getElementById("search");
  if (search) {
    search.addEventListener("input", render);
  }

    // 🔊ボタン
  const btn = document.getElementById("soundBtn");
  if (btn) {
    btn.textContent = soundOn ? "🔊 ON" : "🔇 OFF";
  }

  // 📖ポップアップ
  const modal = document.getElementById("helpModal");
  const hide = localStorage.getItem("hideHelp");

  if (hide !== "true") {
    setTimeout(() => {
      modal.style.display = "flex";
    }, 300);
  }

});
