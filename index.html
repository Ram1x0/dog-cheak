<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>犬の好物チェック</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.item {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}
</style>
</head>

<body>

<h1>🐶 ペット好物チェック</h1>

<div class="topbar">
  <button onclick="resetData()">リセット</button>
  <div id="progress">0 / 0</div>
</div>

<div id="list" class="grid"></div>

<script>
var foods = ["動物共通の餌","ドッグフード","ヒラタケ"];

var list = document.getElementById("list");

for (var i = 0; i < foods.length; i++) {

  var id = "dog_" + i;

  var div = document.createElement("div");
  div.className = "item";

  div.innerHTML =
    '<img src="https://via.placeholder.com/150">' +
    '<p>' + foods[i] + '</p>' +
    '<input type="checkbox" id="' + id + '">';

  list.appendChild(div);

  var cb = document.getElementById(id);

  if (localStorage.getItem(id) === "true") {
    cb.checked = true;
  }

  cb.addEventListener("change", function(e) {
    localStorage.setItem(e.target.id, e.target.checked);
    updateProgress();
  });
}

function updateProgress() {
  var checked = 0;

  for (var i = 0; i < foods.length; i++) {
    if (localStorage.getItem("dog_" + i) === "true") {
      checked++;
    }
  }

  document.getElementById("progress").innerText =
    checked + " / " + foods.length;
}

function resetData() {
  if (confirm("全部リセットしますか？")) {
    for (var i = 0; i < foods.length; i++) {
      localStorage.removeItem("dog_" + i);
    }
    location.reload();
  }
}

updateProgress();
</script>

</body>
</html>
