<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペット好物チェック</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
  font-size: 18px;
}

/* 上部UI */
.topbar {
  position: sticky;
  top: 0;
  background: #f5f5f5;
  z-index: 10;
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

input[type="text"] {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 6px;
  border: none;
  border-radius: 8px;
}

#filterBtn.active {
  background: #4CAF50;
  color: white;
}

/* 4列 */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

/* カード */
.item {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.2s;
}

.item.checked {
  filter: grayscale(100%);
  opacity: 0.4;
}

/* 画像 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 名前 */
.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 4px;
  font-size: 11px;
  color: white;
  background: rgba(0,0,0,0.6);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* タップ領域 */
.tap-area {
  display: block;
  cursor: pointer;
}

.tap-area input {
  display: none;
}

/* チェック表示 */
.tap-area::after {
  content: "✔";
  position: absolute;
  top: 5px;
  right: 5px;
  background: white;
  border-radius: 50%;
  padding: 3px;
  font-size: 10px;
  opacity: 0;
}

.item.checked .tap-area::after {
  opacity: 1;
}

.hidden {
  display: none;
}

#progress {
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🐶 ペット好物チェック</h1>

<div class="topbar">
  <input type="text" id="search" placeholder="検索">
  <button onclick="toggleFilter()" id="filterBtn">未チェック</button>
  <button onclick="resetData()">リセット</button>
</div>

<div id="progress">0 / 0</div>
<br>

<div id="list" class="grid"></div>

<script>

/* ▼ データ（ここだけ編集すればOK） */
const foods = [
{ name: "動物汎用エサ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/001動物汎用のエサ.PNG" },
{ name: "ドッグフード", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/002ドッグフード.PNG" },
{ name: "ヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/003ヒラタケ.PNG" },
{ name: "シイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/004シイタケ.PNG" },
{ name: "マッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/005マッシュルーム.PNG" },
{ name: "リンゴ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/006リンゴ.PNG" },
{ name: "田園サラダ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/007田園サラダ.PNG" },
{ name: "ミックスジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/008ミックスジャム.PNG" },
{ name: "ラズベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/009ラズベリージャム.PNG" },
{ name: "トマトソース", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/010トマトソース.PNG" },
{ name: "ブルーベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/011ブルーベリージャム.PNG" },
{ name:"リンゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/012リンゴジャム.PNG" },
{ name:"イチゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/013イチゴジャム.PNG" },
{ name: "キノコパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/014キノコパイ.PNG" },
{ name: "ヒラタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/015ヒラタケパイ.PNG" },
{ name: "シイタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/016シイタケパイ.PNG" },
{ name: "マッシュルームパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/017マッシュルームパイ.PNG" },
{ name: "焼きキノコ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/018焼きキノコ.PNG" },
{ name: "焼きヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/019焼きヒラタケ.PNG" },
{ name: "焼きシイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/020焼きシイタケ.PNG" },
{ name: "焼きマッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/021焼きマッシュルーム.PNG" },
{ name: "シーフードリゾート", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/022シーフードリゾート.PNG" },
{ name: "カントリー風煮込み", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/023カントリー風煮込み.PNG" },
{ name: "ミートソースパスタ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/024ミートソースパスタ.PNG" },
{ name: "コーンポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/025コーンポタージュ.PNG" },
{ name: "豪華海鮮盛り合わせ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/026豪華海鮮盛り合わせ.PNG" },
{ name: "ミートバーガー", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/027ミートバーガー.PNG" },
{ name: "ナスとひき肉の炒め物", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/028ナスとひき肉の炒め物.PNG" },
{ name: "蒸しタラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/029蒸しタラバガニ.PNG" },
{ name: "蒸し黄金タラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/030蒸し黄金タラバガニ.PNG" },
{ name: "大根おろし肉", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/031大根おろし肉.PNG" },
{ name: "大根クリームポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/refs/heads/main/images/032大根クリームポタージュ.PNG" }
];

const list = document.getElementById("list");

/* ▼ 描画 */
foods.forEach((food, i) => {
  const id = "dog_" + i;

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <label class="tap-area">
      <div class="img-box">
        <img src="${food.img}">
        <div class="label">${food.name}</div>
      </div>
      <input type="checkbox" id="${id}">
    </label>
  `;

  list.appendChild(div);

  const cb = div.querySelector("input");

  cb.checked = localStorage.getItem(id) === "true";

  if (cb.checked) div.classList.add("checked");

  cb.addEventListener("change", () => {
    localStorage.setItem(id, cb.checked);
    div.classList.toggle("checked", cb.checked);

    updateProgress();
    applyFilter();
    sortItems();
  });
});

/* ▼ フィルター */
let showUncheckedOnly = false;

function toggleFilter() {
  showUncheckedOnly = !showUncheckedOnly;
  document.getElementById("filterBtn").classList.toggle("active", showUncheckedOnly);
  applyFilter();
}

function applyFilter() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach((div, i) => {
    const checked = localStorage.getItem("dog_" + i) === "true";
    const text = foods[i].name.toLowerCase();

    let visible = true;

    if (showUncheckedOnly && checked) visible = false;
    if (!text.includes(keyword)) visible = false;

    div.classList.toggle("hidden", !visible);
  });
}

/* ▼ 並び替え */
function sortItems() {
  const items = Array.from(list.children);

  items.sort((a, b) => {
    const aChecked = a.querySelector("input").checked;
    const bChecked = b.querySelector("input").checked;
    return aChecked - bChecked;
  });

  items.forEach(item => list.appendChild(item));
}

/* ▼ 進捗 */
function updateProgress() {
  const total = foods.length;
  let checked = 0;

  foods.forEach((_, i) => {
    if (localStorage.getItem("dog_" + i) === "true") checked++;
  });

  document.getElementById("progress").innerText =
    "未チェック " + (total - checked) + " / " + total;
}

/* ▼ リセット */
function resetData() {
  if (confirm("全部リセットしますか？")) {
    foods.forEach((_, i) => {
      localStorage.removeItem("dog_" + i);
    });
    location.reload();
  }
}

/* ▼ 検索 */
document.getElementById("search").addEventListener("input", applyFilter);

/* 初期処理 */
updateProgress();
applyFilter();
sortItems();

</script>

</body>
</html>
