<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペットの好物チェック表</title>

<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Mochiy Pop One", sans-serif;
  background: #cfefff; /* ←変更 */
  padding: 10px;
}

/* 背景の上に薄いフィルター */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  z-index: -1;
}

h1 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 10px;
}

.topbar {
  display: flex;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 999; /* ←これ追加（超重要） */
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

input {
  flex: 1;
  padding: 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,0,0,0.2);
  font-family: inherit;
}

button:active {
  transform: translateY(2px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

/* iPhone対策 */
.item {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.item.pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* 画像はタップ領域 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.img-box:active {
  transform: scale(0.97);
  transition: 0.1s;
}

/* ボタン領域 */.btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 8px;
}

.btns button {
  font-size: 12px;
  padding: 10px 0;
  border-radius: 10px;
  min-height: 42px;
  font-family: inherit;
  touch-action: manipulation;
}

/* 2ボタン専用に3つ目は非表示 */
.givenBtn {
  display: none;
}

/* ボタン説明 */
.hint {
  font-size: 9px;
  text-align: center;
  opacity: 0.7;
  padding: 4px 0 8px;
}

/* 状態 */
.item.like { border: 3px solid #7bd88f; }
.item.dislike { border: 3px solid #ff6b6b; }
.item.given { border: 3px solid #6bb6ff; }
.item.given {
  opacity: 0.45;
  filter: grayscale(60%);
}

/* 念のため強制で明るさ維持 */
.item.like,
.item.dislike {
  opacity: 1;
  filter: none;
}

/* 画像 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.img-box:active {
  transform: scale(0.96);
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 5px;
  font-size: 10px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  text-align: center;
  left: 0;
  white-space: normal;       /* 改行OK */
  word-break: break-word;    /* 長い単語も折る */
  line-height: 1.2;
}

/* ボタン */
.btns {
  display: flex;
  gap: 4px;
  padding: 5px;
}

.btns button {
  flex: 1;
  font-size: 10px;
}

.likeBtn { background: #d9f8e3; }
.dislikeBtn { background: #ffd6d6; }
.givenBtn { background: #d6e9ff; }

#progress {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

  .img-box {
  cursor: pointer;
  touch-action: manipulation;
}

.btns button {
  min-height: 36px;
}

.petBtn.active {
  background: #ffe082;
}
  
</style>
</head>

<body>

<h1>🐶🐱 ペットの好物チェック表 ✅</h1>

<div style="text-align:center; margin-bottom:8px;">
  <button onclick="setLang('jp')">🇯🇵 日本語</button>
  <button onclick="setLang('en')">🇺🇸 English</button>
</div>

<div class="topbar">
  <input id="search" placeholder="検索">
  <button onclick="resetData()">リセット</button>
</div>

<div style="text-align:center; margin:8px 0;">

    <option value="cat">🐱 猫</option>
  </select>
  <button onclick="addPet()">＋ペット追加</button>
</div>

<div id="petList"></div>

<div id="progress">0 / 0</div>

<div style="text-align:center; margin:10px;">
  <button onclick="generateProfile()">📸 プロフィール生成</button>
</div>

<canvas id="profileCanvas" width="300" height="300" style="display:none;"></canvas>
<img id="profileImg" style="width:100%; max-width:300px; display:block; margin:auto;">
  
<div id="list" class="grid"></div>

{ name: "褐色帽のディレクタマダコ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/123.PNG" },
{ name: "柄帽ディレクタマダコ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/124.PNG" }
];

let lang = "jp";
  
const text = {
  jp: {
    title: "🐶🐱 ペットの好物チェック表",
    search: "検索",
    like: "⭕️好き",
    dislike: "❌嫌い",
    hint: "画像タップ＝あげたことがある"
  },
  en: {
    title: "🐶🐱 Pet Food Check",
    search: "Search",
    like: "⭕️Like",
    dislike: "❌Dislike",
    hint: "Tap image = Fed"
  }
};

let pets = JSON.parse(localStorage.getItem("pets")) || [
  { id: Date.now(), name: "ペット1", type: "dog" }
];

let currentPet = pets[0].id;
  
function setLang(l) {
  lang = l;
  render();
}

function addPet() {
  if (pets.length >= 13) {
    alert("最大13匹まで");
    return;
  }

  const type = document.getElementById("petType").value;

  pets.push({
    id: Date.now(),
    name: "新しいペット",
    type: type
  });

  savePets();
  renderPets();
}

function deletePet(id) {

  if (!confirm("このペットを削除しますか？")) return;

  // 👇削除前に取得（←これが超重要）
  const pet = pets.find(p => p.id === id);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  // データ削除
  for (let i = 0; i < currentFoods.length; i++) {
    localStorage.removeItem(`pet_${id}_${pet.type}_${i}`);
  }

  // ペット削除
  pets = pets.filter(p => p.id !== id);

  // 0匹対策
  if (pets.length === 0) {
    pets.push({
      id: Date.now(),
      name: "ペット1",
      type: "dog"
    });
  }

  // currentPet調整
  if (currentPet === id) {
    currentPet = pets[0].id;
  }

  savePets();

  // 👇これを必ず最後に
  loadPetState();
  renderPets();
  render();
}

function renderPets() {
  const area = document.getElementById("petList");
  area.innerHTML = "";

  pets.forEach((p, i) => {
    const btn = document.createElement("button");

    btn.className = "petBtn";
    if (p.id === currentPet) {
      btn.classList.add("active");
    }

    btn.textContent = `${p.type === "dog" ? "🐶" : "🐱"} ${p.name}`;

    // 長押し削除
    let pressTimer;

    btn.onmousedown = () => {
    pressTimer = setTimeout(() => {
    deletePet(p.id);
  }, 600);
};

    btn.onmouseup = () => clearTimeout(pressTimer);
    btn.onmouseleave = () => clearTimeout(pressTimer);

    btn.ontouchstart = () => {
    pressTimer = setTimeout(() => {
    deletePet(p.id);
  }, 600);
};

    btn.ontouchend = () => clearTimeout(pressTimer);

let tapTimer = null;

btn.onclick = () => {
  if (tapTimer) {
    clearTimeout(tapTimer);
    tapTimer = null;

    // 👇名前変更
    const newName = prompt("名前変更", p.name);
    if (newName && newName.trim() !== "") {
      pets[i].name = newName;
      savePets();
      renderPets();
    }

  } else {
    tapTimer = setTimeout(() => {
      currentPet = p.id;
      loadPetState();
      renderPets();
      render();
      tapTimer = null;
    }, 250);
  }
};

    area.appendChild(btn);
  });
}

function savePets() {
  localStorage.setItem("pets", JSON.stringify(pets));
}

/* =====================
   状態
===================== */
let state = [];

function loadPetState() {

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  state = [];

  for (let i = 0; i < currentFoods.length; i++) {

    const saved = localStorage.getItem(`pet_${currentPet}_${pet.type}_${i}`);

    if (saved) {
      state[i] = JSON.parse(saved);
    } else {
      state[i] = { like: false, dislike: false, given: false };
    }
  }
}

const list = document.getElementById("list");
const search = document.getElementById("search");
const progress = document.getElementById("progress");

/* =====================
   優先度
===================== */
function getPriority(s) {
  if (s.like) return 1;
  if (s.dislike) return 2;
  if (!s.given && !s.like && !s.dislike) return 3;
  return 4;
}

/* =====================
   ソート
===================== */
function sortIndex(a, b) {
  return getPriority(state[a]) - getPriority(state[b]);
}

/* =====================
   サウンド
===================== */
function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  const freq =
    type === "like" ? 740 :
    type === "dislike" ? 180 :
    520;

  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);

  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

/* =====================
   状態変更
===================== */
function setState(i, type, div) {

  state[i][type] = !state[i][type];

  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));

  if (type === "like") state[i].dislike = false;
  if (type === "dislike") state[i].like = false;

  div.classList.add("pop");
  setTimeout(() => div.classList.remove("pop"), 200);

  playSound(type);
  render();
}
  
function toggleGiven(i) {
  state[i].given = !state[i].given;
  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));
  playSound("given"); // ←これ入れるとゲーム感UP
  render();
}

/* 👇ここに新関数を入れる */
function tapFood(i) {
  state[i].given = !state[i].given;

  const pet = pets.find(p => p.id === currentPet);
  localStorage.setItem(`pet_${currentPet}_${pet.type}_${i}`, JSON.stringify(state[i]));

  playSound("given");

  render();
}

/* =====================
   描画
===================== */
function render() {

  document.querySelector("h1").textContent = text[lang].title;
  search.placeholder = text[lang].search;

  list.innerHTML = "";

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  const keyword = search.value.toLowerCase();

  const order = [...currentFoods.keys()].sort(sortIndex);

  order.forEach(i => {

    const food = currentFoods[i];
    const s = state[i];

    if (!food.name.toLowerCase().includes(keyword)) return;

    const div = document.createElement("div");
    div.className = "item";

    if (s.like) div.classList.add("like");
    else if (s.dislike) div.classList.add("dislike");
    else if (s.given) div.classList.add("given");

    div.innerHTML = `
      <div class="img-box">
        <img src="${food.img}" loading="lazy">
        <div class="label">${food.name}</div>
      </div>

      <div class="btns">
        <button class="likeBtn">${text[lang].like}</button>
        <button class="dislikeBtn">${text[lang].dislike}</button>
      </div>

      <div class="hint">${text[lang].hint}</div>
    `;

    div.querySelector(".likeBtn").onclick =
      () => setState(i, "like", div);

    div.querySelector(".dislikeBtn").onclick =
      () => setState(i, "dislike", div);

    div.querySelector(".img-box").onclick = 
      () => tapFood(i);

    list.appendChild(div);
  });

  updateProgress();
}

/* =====================
   進捗
===================== */
function updateProgress() {

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  let done = state.filter(s => s.like || s.dislike || s.given).length;

  progress.textContent = `エサリスト ${done} / ${currentFoods.length}`;
}

/* =====================
   リセット
===================== */
function resetData() {
  if (!confirm("このペットのデータだけリセットしますか？")) return;

  const pet = pets.find(p => p.id === currentPet);
  const currentFoods = pet.type === "dog" ? dogFoods : catFoods;

  for (let i = 0; i < currentFoods.length; i++) {
  localStorage.removeItem(`pet_${currentPet}_${pet.type}_${i}`);
  state[i] = { like: false, dislike: false, given: false };
}

  render();
}

function generateProfile() {

  const canvas = document.getElementById("profileCanvas");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, 300, 300);

  const pet = pets.find(p => p.id === currentPet);

  ctx.fillStyle = "#000";
  ctx.font = "16px sans-serif";
  ctx.fillText(pet.name, 20, 30);

  let y = 60;

  state.forEach((s, i) => {
    const foods = pet.type === "dog" ? dogFoods : catFoods;

    if (s.like) {
      ctx.fillText("好き: " + foods[i].name, 20, y);
      y += 20;
    }
  });

  document.getElementById("profileImg").src = canvas.toDataURL();
}

/* =====================
   起動
===================== */
renderPets();
loadPetState();
render();
search.addEventListener("input", render);

</script>

</body>
</html>
