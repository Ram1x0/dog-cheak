<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>犬の好物チェック</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.item {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🐶 ペット好物チェック</h1>

<div class="topbar">
  <button onclick="resetData()">リセット</button>
  <div id="progress">0 / 0</div>
</div>

<div id="list" class="grid"></div>

<script>
const foods = [
"動物共通の餌","ドッグフード","ヒラタケ"
];

const images = [
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg",
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg",
"https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/IMG_7855.jpeg"
];

const list = document.getElementById("list");

foods.forEach((name, i) => {
  const id = "dog_" + i;

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <img src="${images[i]}">
    <p>${name}</p>
    <input type="checkbox" id="${id}">
  `;

  list.appendChild(div);

  const cb = div.querySelector("input");

  cb.checked = localStorage.getItem(id) === "true";

  cb.addEventListener("change", () => {
    localStorage.setItem(id, cb.checked);
    updateProgress();
  });
});

function updateProgress() {
  const total = foods.length;
  let checked = 0;

  foods.forEach((_, i) => {
    if (localStorage.getItem("dog_" + i) === "true") {
      checked++;
    }
  });

  document.getElementById("progress").innerText = checked + " / " + total;
}

function resetData() {
  if (confirm("全部リセットしますか？")) {
    foods.forEach((_, i) => {
      localStorage.removeItem("dog_" + i);
    });
    location.reload();
  }
}

updateProgress();
</script>

</body>
</html>
