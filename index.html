<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>犬の好物チェック表</title>

<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Mochiy Pop One", sans-serif;
  background: #cfefff; /* ←変更 */
  padding: 10px;
}

/* 背景の上に薄いフィルター */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  z-index: -1;
}

h1 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 10px;
}

<div style="text-align:center; margin-bottom:8px;">
  <button onclick="setLang('jp')">日本語</button>
  <button onclick="setLang('en')">English</button>
</div>

.topbar {
  display: flex;
  gap: 6px;
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

input {
  flex: 1;
  padding: 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  box-shadow: 0 3px 0 rgba(0,0,0,0.2);
  font-family: inherit;
}

button:active {
  transform: translateY(2px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

/* iPhone対策 */
.item {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
}

.item.pop {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* 画像はタップ領域 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.img-box:active {
  transform: scale(0.97);
  transition: 0.1s;
}

/* ボタン領域 */.btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 8px;
}

.btns button {
  font-size: 12px;
  padding: 10px 0;
  border-radius: 10px;
  min-height: 42px;
  font-family: inherit;
  touch-action: manipulation;
}

/* 2ボタン専用に3つ目は非表示 */
.givenBtn {
  display: none;
}

/* ボタン説明 */
.hint {
  font-size: 9px;
  text-align: center;
  opacity: 0.7;
  padding: 4px 0 8px;
}

/* 状態 */
.item.like { border: 3px solid #7bd88f; }
.item.dislike { border: 3px solid #ff6b6b; }
.item.given { border: 3px solid #6bb6ff; }
.item.given {
  opacity: 0.45;
  filter: grayscale(60%);
}

/* 念のため強制で明るさ維持 */
.item.like,
.item.dislike {
  opacity: 1;
  filter: none;
}

/* 画像 */
.img-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  position: relative;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.label {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 5px;
  font-size: 10px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  text-align: center;
}

/* ボタン */
.btns {
  display: flex;
  gap: 4px;
  padding: 5px;
}

.btns button {
  flex: 1;
  font-size: 10px;
}

.likeBtn { background: #d9f8e3; }
.dislikeBtn { background: #ffd6d6; }
.givenBtn { background: #d6e9ff; }

#progress {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

  .img-box {
  cursor: pointer;
  touch-action: manipulation;
}

.btns button {
  min-height: 36px;
}
</style>
</head>

<body>

<h1>🐶 犬の好物チェック表 ✅</h1>

<div class="topbar">
  <input id="search" placeholder="検索">
  <button onclick="resetData()">リセット</button>
</div>

<div id="progress">0 / 0</div>
<div id="list" class="grid"></div>

<script>

/* =====================
   データ
===================== */
const foods = [
{ name: "動物汎用エサ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/001.PNG" },
{ name: "ドッグフード", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/002.PNG" },
{ name: "ヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/003.PNG" },
{ name: "シイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/004.PNG" },
{ name: "マッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/005.PNG" },
{ name: "リンゴ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/006.PNG" },
{ name: "田園サラダ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/007.PNG" },
{ name: "ミックスジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/008.PNG" },
{ name: "ラズベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/009.PNG" },
{ name: "トマトソース", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/010.PNG" },
{ name: "ブルーベリージャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/011.PNG" },
{ name:"リンゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/012.PNG" },
{ name:"イチゴジャム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/013.PNG" },
{ name: "キノコパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/014.PNG" },
{ name: "ヒラタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/015.PNG" },
{ name: "シイタケパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/016.PNG" },
{ name: "マッシュルームパイ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/017.PNG" },
{ name: "焼きキノコ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/018.PNG" },
{ name: "焼きヒラタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/019.PNG" },
{ name: "焼きシイタケ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/020.PNG" },
{ name: "焼きマッシュルーム", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/021.PNG" },
{ name: "シーフードリゾート", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/022.PNG" },
{ name: "カントリー風煮込み", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/023.PNG" },
{ name: "ミートソースパスタ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/024.PNG" },
{ name: "コーンポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/025.PNG" },
{ name: "豪華海鮮盛り合わせ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/026.PNG" },
{ name: "ミートバーガー", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/027.PNG" },
{ name: "ナスとひき肉の炒め物", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/028.PNG" },
{ name: "蒸しタラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/029.PNG" },
{ name: "蒸し黄金タラバガニ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/030.PNG" },
{ name: "大根おろし肉", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/031.PNG" },
{ name: "大根クリームポタージュ", img: "https://raw.githubusercontent.com/Ram1x0/dog-cheak/main/images/032.PNG" }
];

/* =====================
   状態
===================== */
const state = Array(foods.length).fill().map(() => ({
  like: false,
  dislike: false,
  given: false
}));

const list = document.getElementById("list");
const search = document.getElementById("search");
const progress = document.getElementById("progress");

/* =====================
   優先度
===================== */
function getPriority(s) {
  if (s.like) return 1;
  if (s.dislike) return 2;
  if (!s.given && !s.like && !s.dislike) return 3;
  return 4;
}

/* =====================
   ソート
===================== */
function sortIndex(a, b) {
  return getPriority(state[a]) - getPriority(state[b]);
}

/* =====================
   サウンド
===================== */
function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  const freq =
    type === "like" ? 740 :
    type === "dislike" ? 180 :
    520;

  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);

  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

/* =====================
   状態変更
===================== */
function setState(i, type, div) {

  state[i][type] = !state[i][type];

  if (type === "like") state[i].dislike = false;
  if (type === "dislike") state[i].like = false;

  localStorage.setItem("dog_" + i, JSON.stringify(state[i]));

  div.classList.add("pop");
  setTimeout(() => div.classList.remove("pop"), 200);

  playSound(type);
  render();
}

function toggleGiven(i) {
  state[i].given = !state[i].given;
  localStorage.setItem("dog_" + i, JSON.stringify(state[i]));
  playSound("given"); // ←これ入れるとゲーム感UP
  render();
}

/* 👇ここに新関数を入れる */
function tapFood(i) {
  state[i].given = !state[i].given;

  localStorage.setItem("dog_" + i, JSON.stringify(state[i]));

  playSound("given");

  render();
}

/* =====================
   描画
===================== */
function render() {

  list.innerHTML = "";

  const keyword = search.value.toLowerCase();

  const order = [...foods.keys()].sort(sortIndex);

  order.forEach(i => {

    const food = foods[i];
    const s = state[i];

    if (!food.name.toLowerCase().includes(keyword)) return;

    const div = document.createElement("div");
    div.className = "item";

    if (s.like) {div.classList.add("like");}
    else if (s.dislike) {div.classList.add("dislike");}
    else if (s.given) {div.classList.add("given");} // ←ここが暗くなる対象

    div.innerHTML = `
  <div class="img-box" onclick="tapFood(${i})">
  <img src="${food.img}" loading="lazy">
  <div class="label">${food.name}</div>
</div>

  <div class="btns">
    <button class="likeBtn">⭕️好き</button>
    <button class="dislikeBtn">❌嫌い</button>
    <button class="givenBtn">✅済</button>
  </div>

  <div class="hint">画像タップ＝「既にあげたエサ」</div>
`;

    div.querySelector(".likeBtn").onclick =
      () => setState(i, "like", div);

    div.querySelector(".dislikeBtn").onclick =
      () => setState(i, "dislike", div);

    div.querySelector(".givenBtn").onclick =
      () => setState(i, "given", div);

    list.appendChild(div);
  });

  updateProgress();
}

/* =====================
   進捗
===================== */
function updateProgress() {
  let done = state.filter(s => s.like || s.dislike || s.given).length;
  progress.textContent = `エサリスト ${done} / ${foods.length}`;
}

/* =====================
   ロード
===================== */
function load() {
  for (let i = 0; i < foods.length; i++) {
    const saved = localStorage.getItem("dog_" + i);
    if (saved) state[i] = JSON.parse(saved);
  }
}

/* =====================
   リセット
===================== */
function resetData() {
  if (!confirm("リセットしますか？")) return;
  localStorage.clear();
  location.reload();
}

/* =====================
   起動
===================== */
load();
render();
search.addEventListener("input", render);

</script>

</body>
</html>
